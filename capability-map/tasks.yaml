# Capability map — research tasks plotted on LLM vs. human capability axes.
#
# Each entry describes a *research task we (the human + Claude team) do as
# part of this work*. Coordinates are intentionally rough: 0.0 = task is
# infeasible for that actor, 1.0 = task is trivial for that actor. Treat
# these as priors to be revised as evidence accumulates.
#
# Status values:
#   done           — completed in this repo (link via `investigation`)
#   in-progress    — currently being worked
#   hypothesized   — we think it lands here; not yet attempted
#   human-only     — Claude should not attempt (e.g. one-pager prose)
#   blocked        — attempted, hit a wall; see `notes`
#
# Tasks are scoped to *research activities*, not the prompts under study.

tasks:
