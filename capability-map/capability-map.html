        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="e9ce55be-59bf-485e-bb20-e054bedb7aef" class="plotly-graph-div" style="height:900px; width:1100px;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("e9ce55be-59bf-485e-bb20-e054bedb7aef")) {                    Plotly.newPlot(                        "e9ce55be-59bf-485e-bb20-e054bedb7aef",                        [{"hoverinfo":"text","hovertext":["\u003cb\u003eScaffold repo structure\u003c\u002fb\u003e\u003cbr\u003eid: scaffold-repo-structure\u003cbr\u003estudy: 000-research-organization\u003cbr\u003einvestigation: 001-initial-scaffold\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.90 &nbsp; human: 0.80\u003cbr\u003eDone with principles supplied by human; minor decisions delegated.","\u003cb\u003eDesign taxonomy\u003c\u002fb\u003e\u003cbr\u003eid: design-taxonomy\u003cbr\u003estudy: 000-research-organization\u003cbr\u003einvestigation: 001-initial-scaffold\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.60 &nbsp; human: 0.85\u003cbr\u003eHuman chose between presented options.","\u003cb\u003eDesign tool palette\u003c\u002fb\u003e\u003cbr\u003eid: design-tool-palette\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 001-foundations\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.75 &nbsp; human: 0.90\u003cbr\u003ePhase A1. LLM drafted 5 tools; human pushed to split knowledge_lookup (Decision 8) making the final palette six. Tool signatures and cognitive- moment annotations carried by LLM with human surfacing the split.","\u003cb\u003eDesign metadata schema\u003c\u002fb\u003e\u003cbr\u003eid: design-metadata-schema\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 001-foundations\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.70 &nbsp; human: 0.85\u003cbr\u003ePhase A1. LLM drafted; human substantively reshaped \u2014 Decision 11 (register \u2192 3 orthogonal enums), Decision 13 (difficulty_label as signed object), Decision 18 (human_feasibility). LLM-first draft, human-led refinement.","\u003cb\u003eDesign ID scheme\u003c\u002fb\u003e\u003cbr\u003eid: design-id-scheme\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 001-foundations\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.80 &nbsp; human: 0.85\u003cbr\u003ePhase A1. LLM designed the slug format; human caught the multi-token tool-name parse bug (Decision 12, switched field separator to `-`).","\u003cb\u003eDesign system-prompt library\u003c\u002fb\u003e\u003cbr\u003eid: design-system-prompt-library\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 001-foundations\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.75 &nbsp; human: 0.85\u003cbr\u003ePhase A1. Human picked the 9-variant matrix; LLM wrote the templates and manifest. 4 variants drafted but unused by A1 seeds \u2014 kept for A2\u002fA3.","\u003cb\u003eCurate 17 seed matched pairs\u003c\u002fb\u003e\u003cbr\u003eid: curate-seed-prompts\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 001-foundations\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.50 &nbsp; human: 0.85\u003cbr\u003ePhase A1. LLM drafted 16 pairs; human contributed pair 17 (Aunt Nina) and stamp-reviewed every half. LLM confabulated knowledge-base content (Decision 16) and made arithmetic errors that the user caught (Decision 17), pulling the LLM score down from the 0.45 hypothesis to 0.5 \u2014 better than expected at structure, worse at fact-grounding.","\u003cb\u003eCurate KBs (user persona + parallel general-knowledge KBs)\u003c\u002fb\u003e\u003cbr\u003eid: curate-knowledge-bases\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 001-foundations\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.45 &nbsp; human: 0.70\u003cbr\u003ePhase A1 ancillary, surfaced mid-execution. LLM strong on fictional persona (Maya Patel) but confabulated when grounding general-knowledge KB \u2014 until pulled back to use WebSearch (Decision 16). The fabricated + verified parallel pair is itself a research artifact for a sibling investigation.","\u003cb\u003eDefine per-tool difficulty axes\u003c\u002fb\u003e\u003cbr\u003eid: define-difficulty-axes\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 002-difficulty-axes\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.60 &nbsp; human: 0.75\u003cbr\u003ePhase A2 (Decision 1, 2026-05-11). LLM drafted per-tool axes; human signed off as-is. Subsequent A4 empirical work (006 F3\u002fF4\u002fF5) showed the axes don't predict tool-call calibration \u2014 task-difficulty vs tool-call-calibration mismatch. See investigation 007.","\u003cb\u003eBulk-generate prompt corpus\u003c\u002fb\u003e\u003cbr\u003eid: bulk-generate-corpus\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 003-bulk-generation\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.85 &nbsp; human: 0.25\u003cbr\u003ePhase A3, 2026-05-12. Subagent-driven generation against the 002 axes proposal. 183 pairs \u002f 366 records, KB-grounded, anti-leakage on Type A trivial halves. 4 reviewer items pending; awaiting A4 grading.","\u003cb\u003eTool-description A\u002fB optimization\u003c\u002fb\u003e\u003cbr\u003eid: tool-spec-optimization\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 005-tool-spec-optimization\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.80 &nbsp; human: 0.70\u003cbr\u003e2026-05-12. Variant runner + 5 A\u002fB experiments + style guide synthesis. Found \"REQUIRED whenever...\" is the load-bearing lever (over naming\u002fepistemic framing); over-cueing hurts.","\u003cb\u003eMethodology lock (temperature \u00d7 prompt 2\u00d72)\u003c\u002fb\u003e\u003cbr\u003eid: temperature-prompt-2x2\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 006-temperature-prompt\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.85 &nbsp; human: 0.65\u003cbr\u003e2026-05-12. Full 4B IT + 12B IT factorial. Locked temp=1.0, top_p=0.95 as production-typical baseline. Surfaced scale \u00d7 directive interaction.","\u003cb\u003eRun empirical calibration (A1 corpus, 4B + 12B)\u003c\u002fb\u003e\u003cbr\u003eid: empirical-calibration-run\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 004-calibration-pilot\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.90 &nbsp; human: 0.40\u003cbr\u003ePhase A4 pilot 2026-05-12. 4B IT pilot + 12B IT escalation, both models 2\u00d72 vs neutral\u002fdirective prompts. ~2,880 trials between them. All harness automation; human directed model selection + setup.","\u003cb\u003eCross-model eval infrastructure\u003c\u002fb\u003e\u003cbr\u003eid: cross-model-eval-infra\u003cbr\u003estudy: 001-tool-calibration\u003cbr\u003einvestigation: 004-calibration-pilot\u003cbr\u003estatus: done\u003cbr\u003eLLM: 0.80 &nbsp; human: 0.55\u003cbr\u003eHarness (Ollama HTTP backend over Tailscale to desktop WSL + Gemini API stub), runner with sampling + prompt-set controls, analyzer with retroactive rescoring. Built into A4 pilot."],"marker":{"color":"#2D5016","line":{"color":"#3B2F2F","width":0.8},"size":14,"symbol":"circle"},"mode":"markers+text","name":"done","text":["Scaffold repo structure","Design taxonomy","Design tool palette","Design metadata schema","Design ID scheme","Design system-prompt library","Curate 17 seed matched pairs","Curate KBs (user persona + parallel general-knowledge KBs)","Define per-tool difficulty axes","Bulk-generate prompt corpus","Tool-description A\u002fB optimization","Methodology lock (temperature \u00d7 prompt 2\u00d72)","Run empirical calibration (A1 corpus, 4B + 12B)","Cross-model eval infrastructure"],"textfont":{"size":10},"textposition":"top center","x":[0.9,0.6,0.75,0.7,0.8,0.75,0.5,0.45,0.6,0.85,0.8,0.85,0.9,0.8],"y":[0.8,0.85,0.9,0.85,0.85,0.85,0.85,0.7,0.75,0.25,0.7,0.65,0.4,0.55],"type":
