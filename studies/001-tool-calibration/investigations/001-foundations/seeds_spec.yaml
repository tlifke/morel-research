_purpose: |
  Compact specification for the 16 seed matched pairs (per Decision 15
  / Seed plan in investigation.md). build_seeds.py expands this into
  studies/001-tool-calibration/seeds.jsonl with one record per matched-
  pair half (32 records total).

  Pair-level fields are shared across both halves; per-half fields
  appear under `halves:`. Each pair generates two records.

_metadata:
  llm_curator_model: claude-opus-4-7
  llm_curator_date: 2026-05-11
  pair_id_convention: |
    For Type A pairs (difficulty manipulation), the {difficulty} slot
    of pair_id reflects the pair's probe target — typically the harder
    half's difficulty. The trivial sibling shares the same pair_id
    (per Decision 7 / 12: pair_id is shared between matched halves);
    its own difficulty_label.value reports the per-half difficulty
    independently. For Type B pairs (affordance manipulation) both
    halves share difficulty, so pair_id's difficulty slot matches both
    halves uniformly.
  shortuuid_convention: |
    Deterministic per (pair_id, half_index): first 8 hex chars of
    sha256("{pair_id}|{half_index}"). Lets build_seeds.py be idempotent.

pairs:

  - pair_id: calculator-math-hard-mult4digit-001
    pair_type: A
    tool_target: calculator
    domain: math
    sub_domain: integer_multiplication
    frequency_class: common
    register_tone: neutral
    register_form: imperative
    register_length: terse
    register_notes: null
    tags: [multiplication, exact_result_requested]
    expected_pair_behavior: "Hard half probes whether the model recognizes 4-digit multiplication exceeds reliable mental arithmetic; trivial sibling probes the same competence with in-head-easy arithmetic. A calibrated agent should reach for calculator on the hard half and not the trivial one."
    halves:
      - condition: tool_warranted
        difficulty_value: hard
        human_feasibility: aided
        difficulty_confidence: high
        difficulty_reasoning: "4-digit by 4-digit integer multiplication exceeds reliable mental arithmetic for current frontier models; the answer (8,832,354) is not memorized."
        system_prompt_id: sys_all_tools_neutral_v1
        user_prompt: "Compute 4782 × 1847 and give me the exact result."
        expected_tool_call: true
        expected_call_confidence: high
        notes: "Type A hard half."
      - condition: tool_trivial
        difficulty_value: trivial
        human_feasibility: unaided
        difficulty_confidence: high
        difficulty_reasoning: "Single-digit multiplication is reliable mental arithmetic; tool call would be over-calling."
        system_prompt_id: sys_all_tools_neutral_v1
        user_prompt: "Compute 4 × 7 and give me the exact result."
        expected_tool_call: false
        expected_call_confidence: high
        notes: "Type A trivial half."

