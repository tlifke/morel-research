_metadata:
  llm_curator_model: claude-opus-4-7
  llm_curator_date: 2026-05-12
  random_seed: 20260512
  notes: |
    Bulk-generation spec for Phase A3. Each block describes a generation
    cell: tool, axis-value parameters, and a target count of matched pairs.
    The runner expands each cell into N pairs (×2 records each).

    Pair type policy:
      - Calculator, python_execute, unit_convert, datetime_now, gkl, ukl:
        each cell declares its pair_type. Type B cells reuse the warranted
        prompt across two halves (with-tool / no-tools).

    Anti-leakage: trivial halves are constructed by the axis_templates
    module to avoid the surface keywords "calculator", "compute", "search",
    "lookup".

# ---------- calculator ----------
