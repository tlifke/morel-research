  datetime_now-time-medium-current_date-001:
    - {agreed: true, notes: "Reviewer flagged tool reproducibility: datetime_now should return a fixed value tied to the runtime anchor (2026-05-11) when actually wired for grading, otherwise late verification can mark correct calls false. Captured in investigation Decision 18."}
    - {agreed: true}

  datetime_now-time-medium-today_affordance-001:
    - {agreed: true}
    - {agreed: true}
