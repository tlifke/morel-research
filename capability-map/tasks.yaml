# Capability map — research tasks plotted on LLM vs. human capability axes.
#
# Each entry describes a *research task we (the human + Claude team) do as
# part of this work*. Coordinates are intentionally rough: 0.0 = task is
# infeasible for that actor, 1.0 = task is trivial for that actor. Treat
# these as priors to be revised as evidence accumulates.
#
# Status values:
#   done           — completed in this repo (link via `investigation`)
#   in-progress    — currently being worked
#   hypothesized   — we think it lands here; not yet attempted
#   human-only     — Claude should not attempt (e.g. one-pager prose)
#   blocked        — attempted, hit a wall; see `notes`
#
# Tasks are scoped to *research activities*, not the prompts under study.

tasks:
  # ----- Study 0: research organization ------------------------------------
  - id: scaffold-repo-structure
    label: Scaffold repo structure
    study: 000-research-organization
    investigation: 001-initial-scaffold
    llm_capability: 0.9
    human_capability: 0.8
    status: done
    notes: Done with principles supplied by human; minor decisions delegated.

  - id: design-taxonomy
    label: Design taxonomy
    study: 000-research-organization
    investigation: 001-initial-scaffold
    llm_capability: 0.6
    human_capability: 0.85
    status: done
    notes: Human chose between presented options.

  - id: lineage-graph-render
    label: Render lineage graph
    study: 000-research-organization
    investigation: null
    llm_capability: 0.85
    human_capability: 0.5
    status: hypothesized
    notes: Generate DOT/Mermaid from lineage.yaml.

  - id: frontmatter-validator
    label: Validate frontmatter
    study: 000-research-organization
    investigation: null
    llm_capability: 0.9
    human_capability: 0.5
    status: hypothesized

  # ----- Study 1: tool calibration -----------------------------------------
  - id: design-tool-palette
    label: Design tool palette
    study: 001-tool-calibration
    investigation: 001-foundations
    llm_capability: 0.75
    human_capability: 0.9
    status: done
    notes: Phase A1. LLM drafted 5 tools; human pushed to split knowledge_lookup
      (Decision 8) making the final palette six. Tool signatures and cognitive-
      moment annotations carried by LLM with human surfacing the split.

  - id: design-metadata-schema
    label: Design metadata schema
    study: 001-tool-calibration
    investigation: 001-foundations
    llm_capability: 0.7
    human_capability: 0.85
    status: done
    notes: Phase A1. LLM drafted; human substantively reshaped — Decision 11
      (register → 3 orthogonal enums), Decision 13 (difficulty_label as signed
      object), Decision 18 (human_feasibility). LLM-first draft, human-led
      refinement.

  - id: design-id-scheme
    label: Design ID scheme
    study: 001-tool-calibration
    investigation: 001-foundations
    llm_capability: 0.8
    human_capability: 0.85
    status: done
    notes: Phase A1. LLM designed the slug format; human caught the multi-token
      tool-name parse bug (Decision 12, switched field separator to `-`).

  - id: design-system-prompt-library
    label: Design system-prompt library
    study: 001-tool-calibration
    investigation: 001-foundations
    llm_capability: 0.75
    human_capability: 0.85
    status: done
    notes: Phase A1. Human picked the 9-variant matrix; LLM wrote the templates
      and manifest. 4 variants drafted but unused by A1 seeds — kept for A2/A3.

  - id: curate-seed-prompts
    label: Curate 17 seed matched pairs
    study: 001-tool-calibration
    investigation: 001-foundations
    llm_capability: 0.5
    human_capability: 0.85
    status: done
    notes: Phase A1. LLM drafted 16 pairs; human contributed pair 17 (Aunt Nina)
      and stamp-reviewed every half. LLM confabulated knowledge-base content
      (Decision 16) and made arithmetic errors that the user caught
      (Decision 17), pulling the LLM score down from the 0.45 hypothesis to 0.5
      — better than expected at structure, worse at fact-grounding.

  - id: curate-knowledge-bases
    label: Curate KBs (user persona + parallel general-knowledge KBs)
    study: 001-tool-calibration
    investigation: 001-foundations
    llm_capability: 0.45
    human_capability: 0.7
    status: done
    notes: Phase A1 ancillary, surfaced mid-execution. LLM strong on fictional
      persona (Maya Patel) but confabulated when grounding general-knowledge KB
      — until pulled back to use WebSearch (Decision 16). The fabricated +
      verified parallel pair is itself a research artifact for a sibling
      investigation.

  - id: define-difficulty-axes
    label: Define per-tool difficulty axes
    study: 001-tool-calibration
    investigation: 002-difficulty-axes
    llm_capability: 0.6
    human_capability: 0.75
    status: done
    notes: Phase A2 (Decision 1, 2026-05-11). LLM drafted per-tool axes; human
      signed off as-is. Subsequent A4 empirical work (006 F3/F4/F5) showed
      the axes don't predict tool-call calibration — task-difficulty vs
      tool-call-calibration mismatch. See investigation 007.

  - id: bulk-generate-corpus
    label: Bulk-generate prompt corpus
    study: 001-tool-calibration
    investigation: 003-bulk-generation
    llm_capability: 0.85
    human_capability: 0.25
    status: done
    notes: Phase A3, 2026-05-12. Subagent-driven generation against the 002
      axes proposal. 183 pairs / 366 records, KB-grounded, anti-leakage on
      Type A trivial halves. 4 reviewer items pending; awaiting A4 grading.

  - id: tool-spec-optimization
    label: Tool-description A/B optimization
    study: 001-tool-calibration
    investigation: 005-tool-spec-optimization
    llm_capability: 0.8
    human_capability: 0.7
    status: done
    notes: 2026-05-12. Variant runner + 5 A/B experiments + style guide
      synthesis. Found "REQUIRED whenever..." is the load-bearing lever
      (over naming/epistemic framing); over-cueing hurts.

  - id: temperature-prompt-2x2
    label: Methodology lock (temperature × prompt 2×2)
    study: 001-tool-calibration
    investigation: 006-temperature-prompt
    llm_capability: 0.85
    human_capability: 0.65
    status: done
    notes: 2026-05-12. Full 4B IT + 12B IT factorial. Locked temp=1.0,
      top_p=0.95 as production-typical baseline. Surfaced scale × directive
      interaction.

  - id: empirical-calibration-run
    label: Run empirical calibration (A1 corpus, 4B + 12B)
    study: 001-tool-calibration
    investigation: 004-calibration-pilot
    llm_capability: 0.9
    human_capability: 0.4
    status: done
    notes: Phase A4 pilot 2026-05-12. 4B IT pilot + 12B IT escalation, both
      models 2×2 vs neutral/directive prompts. ~2,880 trials between them.
      All harness automation; human directed model selection + setup.

  - id: bulk-corpus-grading
    label: Empirical grading of bulk corpus
    study: 001-tool-calibration
    investigation: 007-axes-performativity
    llm_capability: 0.9
    human_capability: 0.2
    status: in-progress
    notes: Phase A4 extension, 2026-05-12. 4B IT + 12B IT against the 366-
      record bulk corpus at neutral temp=1.0 n=10. Substrate for 007.

  - id: axes-performativity-analysis
    label: Test whether difficulty axes predict tool-call calibration
    study: 001-tool-calibration
    investigation: 007-axes-performativity
    llm_capability: 0.65
    human_capability: 0.8
    status: in-progress
    notes: Triggered by 006 F3/F4/F5 finding. Empirical work gated on
      bulk-corpus-grading. LLM does correlation work + feature engineering;
      human directs reformulation if axes need replacing.

  - id: cross-model-eval-infra
    label: Cross-model eval infrastructure
    study: 001-tool-calibration
    investigation: 004-calibration-pilot
    llm_capability: 0.8
    human_capability: 0.55
    status: done
    notes: Harness (Ollama HTTP backend over Tailscale to desktop WSL +
      Gemini API stub), runner with sampling + prompt-set controls,
      analyzer with retroactive rescoring. Built into A4 pilot.

  # ----- Cross-cutting -----------------------------------------------------
  - id: write-one-pager-prose
    label: Write one-pager prose
    study: null
    investigation: null
    llm_capability: 0.0
    human_capability: 0.9
    status: human-only
    notes: Policy decision — Claude scaffolds and gives feedback only.
